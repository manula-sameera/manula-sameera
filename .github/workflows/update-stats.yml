name: Update stats

on:
  schedule:
    - cron: "17 3 * * 1" # weekly, Monday 03:17 UTC
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - scripts/generate-stats.mjs
      - .github/workflows/update-stats.yml

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate stats SVGs
        run: node scripts/generate-stats.mjs
        env:
          # STATS_TOKEN: classic PAT with repo + read:user scopes, needed for
          # private contribution counts. Falls back to the default token
          # (public data only) if the secret is not set.
          GITHUB_TOKEN: ${{ secrets.STATS_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/stats-dark.svg assets/stats-light.svg
          git diff --cached --quiet || { git commit -m "chore: refresh stats"; git push; }
